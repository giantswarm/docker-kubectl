version: 2.1

orbs:
  architect: giantswarm/architect@8.0.2

workflows:
  build:
    jobs:
      - architect/push-to-registries:
          context: architect
          name: push-to-registries
          multiarch: true
          filters:
            tags:
              only: /^v.*/
            branches:
              ignore:
                - main
                - master
